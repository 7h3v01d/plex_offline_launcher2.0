<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ code }} Error</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --gold: #e5a00d; --bg: #0e0f11; --surface: #161819;
            --border: #2a2d30; --text: #e8e8e8; --text-muted: #7a7e84;
            --font-heading: 'Bebas Neue', 'Impact', 'Arial Narrow', sans-serif;
            --font-body: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            font-family: var(--font-body);
            background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex;
            align-items: center; justify-content: center; padding: 2rem;
        }
        .box {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 3rem 3.5rem;
            text-align: center; max-width: 480px;
        }
        .code {
            font-family: var(--font-heading); font-size: 5rem;
            letter-spacing: 0.05em; color: var(--gold); line-height: 1;
        }
        .label { font-size: 1.1rem; font-weight: 600; margin: 1rem 0 0.75rem; }
        .msg { color: var(--text-muted); font-size: 0.9rem; line-height: 1.6; margin-bottom: 2rem; }
        .btn {
            display: inline-block; padding: 0.6rem 1.4rem;
            background: var(--gold); color: #0e0f11;
            border-radius: 7px; text-decoration: none;
            font-weight: 600; font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="code">{{ code }}</div>
        <div class="label">
            {% if code == 404 %}Not Found
            {% elif code == 403 %}Forbidden
            {% elif code == 503 %}Service Unavailable
            {% else %}Something Went Wrong{% endif %}
        </div>
        <p class="msg">{{ message }}</p>
        <a href="/" class="btn">← Back to Home</a>
    </div>
</body>
</html>
